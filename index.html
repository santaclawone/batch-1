<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Batch 1 - Site Audit Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;font-family:Inter,-apple-system,sans-serif;background:#f8f7f4}
body{display:flex;flex-direction:column;overflow:hidden}
.header{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#fff;border-bottom:1px solid #f1f5f9;z-index:10}
.header h1{font-size:15px;font-weight:700;color:#0f172a}
.header .counter{font-size:12px;font-weight:600;color:#94a3b8;background:#f8fafc;padding:4px 10px;border-radius:8px;border:1px solid #f1f5f9}

.card-scroll{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding:16px 16px 12px;display:flex;flex-direction:column;align-items:center;min-height:0;height:100%}
@media(max-width:600px){
  .card-scroll{padding:0}
}

.card{width:100%;max-width:560px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
@media(max-width:600px){.card{max-width:100%;border-radius:0;border:none;box-shadow:none}}
.top-bar{height:3px;background:#1e293b}

.brand{padding:36px 48px 0;display:flex;justify-content:space-between;align-items:center}
.brand-tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;background:rgba(13,148,136,.07);color:#0d9488}
.brand-muted{font-size:11px;color:#94a3b8}
.brand-date{font-size:10px;color:#cbd5e1}

.greeting{padding:32px 48px 0}
.greeting h2{margin:0 0 18px;font-size:20px;font-weight:600;color:#0f172a;letter-spacing:-.01em;font-family:Playfair Display,serif}
.greeting p{margin:0 0 16px;font-size:15px;color:#334155;line-height:1.7}

.score-pad{padding:4px 48px 28px}
.score-num{font-size:52px;font-weight:600;color:#0f172a;letter-spacing:-.03em;line-height:1;font-family:Playfair Display,serif}
.score-total{font-size:18px;font-weight:400;color:#94a3b8;margin-left:4px}
.score-label{font-size:12px;color:#94a3b8;padding-top:4px}
.score-bar-row{display:flex;align-items:center;padding:0 48px 16px}
.score-bar-track{width:120px;height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden}
.score-bar-fill{height:4px;border-radius:2px}
.score-bar-label{font-size:11px;color:#94a3b8;padding-left:10px}

hr{border:none;height:1px;background:#f1f5f9;margin:0 48px}
.sec-header{padding:20px 48px 4px}
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.sec-sub{font-size:11px;color:#94a3b8;margin-top:3px}
.sec-intro{padding:4px 48px 0}
.sec-intro p{margin:0 0 12px;font-size:13px;color:#475569;line-height:1.6}
.sec-body{padding:0 48px 4px}
.item{padding:0 0 18px;border-bottom:1px solid #f1f5f9;margin-bottom:18px}
.item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.item-row{display:table;width:100%}
.item-bullet{display:table-cell;width:18px;vertical-align:top;padding:2px 0 0}
.item-content{display:table-cell;padding:0 0 0 10px}
.item-title{font-size:14px;color:#0f172a;line-height:1.6;font-weight:500}
.item-fix{font-size:13px;line-height:1.5;margin-top:4px}

.dead-banner{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:8px;padding:10px 14px;margin:0 48px 16px;text-align:center;font-size:12px;color:#dc2626}

.record-box{padding:24px 48px 0}
.record-inner{background:#fdfbf7;border-radius:10px;border:1px solid #f1ede4;padding:16px 20px}
.record-inner p{margin:0;font-size:13px;color:#6b5a3e;line-height:1.6}

.what-we-do{padding:28px 48px 0}
.wwd-label{font-size:11px;font-weight:500;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.what-we-do p{margin:0;font-size:14px;color:#475569;line-height:1.7}
.what-we-do strong{color:#0f172a}

.cta-box{padding:28px 48px 0}
.cta-inner{background:#f0fdfa;border-radius:10px;border:1.5px solid rgba(13,148,136,.27);padding:20px 24px}
.cta-inner h3{margin:0 0 10px;font-size:15px;font-weight:700;color:#0f172a;font-family:Playfair Display,serif}
.cta-inner p{margin:0 0 10px;font-size:14px;color:#475569;line-height:1.6}
.cta-inner p:last-child{margin-bottom:0}

.signoff{padding:24px 48px 28px;display:flex;align-items:center}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px;flex-shrink:0;background:linear-gradient(135deg,#0d9488,rgba(13,148,136,.47))}
.signoff-text{padding-left:12px}
.signoff-name{font-size:14px;font-weight:600;color:#0f172a}
.signoff-title{font-size:12px;color:#94a3b8}

.email-list{padding:0 48px 4px}
.email-link{font-size:12px;color:#0d9488;padding:2px 0}
.site-link{font-size:10px;color:#94a3b8;word-break:break-all;margin-top:4px}
.site-link a{color:#0d9488;text-decoration:none}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;font-size:12px;line-height:1.8}
.stats-grid .k{color:#64748b}
.stats-grid .v{font-weight:500;color:#0f172a;text-align:right}

.nav-bar{flex-shrink:0;display:flex;justify-content:space-between;padding:10px 20px 14px;gap:10px;background:#fff;border-top:1px solid #f1f5f9;z-index:10}
.nav-btn{background:#fff;border:1px solid #e2e8f0;color:#334155;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;flex:1;font-family:inherit}
.nav-btn:hover:not(:disabled){background:#f8fafc;border-color:#cbd5e1}
.nav-btn:disabled{opacity:.3;cursor:default}

.footer{flex-shrink:0;text-align:center;color:#94a3b8;font-size:10px;padding:0 0 8px}

@media(max-width:600px){
  .brand,.greeting,.score-pad,.score-bar-row,.sec-header,.sec-intro,.sec-body,.dead-banner,.record-box,.what-we-do,.cta-box,.signoff,.email-list{padding-left:20px!important;padding-right:20px!important}
  hr{margin-left:20px!important;margin-right:20px!important}
  .score-num{font-size:36px}
  .greeting h2{font-size:17px}
  .item-title{font-size:13px}
}
</style>
</head>

  <h1>Batch 1 &mdash; Site Audits</h1>

</div>
<div class="card-scroll" id="wrapper">
  <div class="card" id="card"></div>
  <div class="footer">Automated audit by AI</div>
</div>
<div class="nav-bar">
  <button class="nav-btn" id="prevBtn" disabled>&larr; Prev</button>
  <button class="nav-btn" id="nextBtn">Next &rarr;</button>
</div>

function pairText(iss){
  var raw = iss.toLowerCase();
  var l = raw.replace(/^(seo:|perf:|performance:|design:|mobile:|business:|conversion:|content:|security:|mobile:|seo |perf |design |mobile |business |content |security )["'\s]*/,'');

  // SSL
  if(l.indexOf("certificate expires")>=0||l.indexOf("ssl expires")>=0)return["SSL certificate expiring soon","An expired SSL breaks your site for every visitor and shows a full-screen security warning. Browsers actively block expired certificates."];
  if(l.indexOf("no ssl")>=0||l.indexOf("ssl certificate")>=0||l.indexOf("ssl")>=0)return["No SSL certificate detected","Without a valid SSL, visitors see a 'Not Secure' warning in their browser bar and Google flags your site. That warning alone sends most people away before they read a word."];

  // Builders
  if(l.indexOf("godaddy")>=0)return["Using GoDaddy Website Builder","GoDaddy locks your site into their platform. You can't migrate it elsewhere, and the code is bloated which hurts performance and SEO. You're paying monthly for something you don't own."];
  if(l.indexOf("wix")>=0)return["Using Wix","Wix sites load slowly and you can't fully control your SEO. Moving to another host means rebuilding from scratch. A lightweight site loads in under a second on Wix's editor takes five."];
  if(l.indexOf("squarespace")>=0)return["Using Squarespace","Squarespace locks your content into their template system. Advanced SEO and fast load times are platform-limited. You're paying monthly for something you could own outright."];
  if(l.indexOf("shopify")>=0)return["Using Shopify","Shopify charges monthly fees plus transaction fees on every sale. A custom e-commerce site pays for itself in a year and you own the code and your customer data."];
  if(l.indexOf("diy")>=0||l.indexOf("builder")>=0||l.indexOf("platform")>=0)return["Using a DIY website builder","DIY platforms limit your SEO control, page speed, and customisation. You're stuck with monthly fees for a site you can't fully own or optimise."];

  // Mixed content
  if(l.indexOf("http resource")>=0||l.indexOf("http://")>=0||l.indexOf("mixed content")>=0)return["Mixed content detected","Browsers block mixed content (HTTP resources on an HTTPS page) by default. Your visitors see broken images or a grey padlock warning — making your site look insecure even with a valid SSL."];

  // CSS
  if(l.indexOf("css file")>=0||l.indexOf("external css")>=0)return["Multiple external CSS files","Each separate CSS file adds an extra HTTP request. On a mobile connection, 8+ CSS files can add a full second of load time before the page even starts rendering."];

  // Scripts
  if(l.indexOf("too many script")>=0||l.indexOf("external script")>=0||l.indexOf("many scripts")>=0||l.indexOf("too many javascript")>=0)return["Too many scripts loading","Every script tag triggers a blocking network request. At 20+, you're adding 2-4 seconds of load time before visitors see anything. People leave sites that take more than 3 seconds."];

  // Mobile
  if(l.indexOf("viewport")>=0)return["Missing viewport meta tag","Without a viewport meta tag, mobile users see a zoomed-out mini version of your site that they have to pinch to read. Over 60% of your visitors are on phones — they'll leave immediately."];
  if(l.indexOf("no mobile")>=0||l.indexOf("not responsive")>=0||l.indexOf("responsively")>=0)return["The site isn't configured for mobile","Over half your visitors are on phones. If they have to pinch and zoom to read anything, they'll leave within seconds and find a competitor who works on their phone."];
  if(l.indexOf("mobile")>=0||l.indexOf("responsive")>=0)return["The site isn't mobile-friendly","More than 60% of Irish consumers browse on phones first. If your site doesn't fit their screen, they leave within seconds and Google ranks mobile-friendly sites higher."];

  // Page size / content
  if(l.indexOf("0.8kb")>=0||l.indexOf("very small page")>=0)return["Page is unusually small","Pages under 5KB usually mean broken JavaScript or an incomplete render. If the page looks empty to you, it looks empty to your visitors too."];
  if(l.indexOf("page size")>=0||l.indexOf("large page")>=0||l.indexOf("page is larger")>=0)return["Page is larger than recommended","Pages over 250KB load noticeably slower on 4G. Every extra second of load time costs you visitors — 40% of people abandon sites that take more than 3 seconds to load."];
  if(l.indexOf("thin content")>=0||l.indexOf("low content")>=0||l.indexOf("not enough content")>=0)return["Content is too thin","Google needs text content to understand what your site is about. A one-pager with a paragraph won't rank for any search term. Competitors with proper pages get the traffic instead."];

  // Images
  if(l.indexOf("broken image")>=0)return["Broken images on the page","Broken images show as empty boxes or missing icons. Every one makes your site look neglected and untrustworthy."];
  if(l.indexOf("alt text")>=0||l.indexOf("missing alt")>=0||l.indexOf("img alt")>=0)return["Images missing alt text","Alt text helps blind visitors understand your images and helps Google index them. Without it, you risk accessibility complaints and lose SEO value from your images."];
  if(l.indexOf("no image")>=0||l.indexOf("placeholder")>=0)return["Low-quality or missing images","Pages without real photography feel uninviting and erode trust before visitors read a single word. Stock placeholders look unprofessional."];

  // H1 / Title
  if(l.indexOf("h1")>=0||l.indexOf("heading")>=0||l.indexOf("title tag")>=0)return["No H1 heading on the page","Google uses your H1 tag as a primary ranking signal and screen readers use it to navigate. Without one, search engines have to guess what your page is about — and they often guess wrong."];
  if(l.indexOf("meta description")>=0||l.indexOf("meta desc")>=0||l.indexOf("page title")>=0)return["There's no meta description","Google uses your meta description as the search snippet. Without one, it pulls random text from your page instead — which rarely compels anyone to click through."];

  // Other SEO
  if(l.indexOf("canonical")>=0)return["No canonical URL is set","If your page loads at multiple URLs (with and without www, trailing slash, or parameters), Google splits your ranking authority across all of them — meaning none ranks as high as it should."];
  if(l.indexOf("open graph")>=0||l.indexOf("og tag")>=0||l.indexOf("og:")>=0)return["Missing Open Graph tags","When someone shares your site on Facebook, LinkedIn, or WhatsApp, OG tags control the preview card. Without them, you get a bare link with the wrong image — looks untrustworthy and gets fewer clicks."];
  if(l.indexOf("schema")>=0||l.indexOf("structured data")>=0)return["No schema markup","Schema tells Google your hours, address, phone, and reviews. Sites with structured data rank higher in local searches and show richer snippets that get more clicks."];
  if(l.indexOf("analytics")>=0)return["No analytics tracking","Without analytics, you're making business decisions blind. No idea where your traffic comes from, which pages work, or why people leave."];

  // Design quality
  if(l.indexOf("inline style")>=0||l.indexOf("inline css")>=0)return["Too many inline styles","Inline styles can't be cached and bloat every page. Future updates mean editing every page individually — a maintenance nightmare as your site grows."];
  if(l.indexOf("favicon")>=0)return["No favicon detected","Every browser tab and bookmark shows a blank document icon instead of your brand. It's a tiny detail that says 'nobody finished this site'."];
  if(l.indexOf("outdated layout")>=0||l.indexOf("flexbox")>=0||l.indexOf("float")>=0||l.indexOf("table layout")>=0)return["Outdated layout method","Float/table-based layouts break on mobile and signal the site hasn't been updated in 5+ years. Modern CSS Flexbox and Grid work beautifully on every screen size."];
  if(l.indexOf("color palette")>=0||l.indexOf("limited palette")>=0||l.indexOf("colour palette")>=0)return["Limited colour palette","A single colour throughout looks flat and un-designed. Even one accent colour on buttons and links dramatically improves the professional feel."];
  if(l.indexOf("navbar")>=0||l.indexOf("nav menu")>=0)return["No semantic navbar","Screen readers use <nav> to let blind users jump straight to the menu. Google also uses it to understand your site structure. A plain <div> gives neither any clue."];

  // Contact
  if(l.indexOf("no contact")>=0||l.indexOf("contact method")>=0||l.indexOf("contact form")>=0||l.indexOf("missing contact")>=0)return["No contact method found","If potential customers can't reach you within 5 seconds of visiting your site, they go to your competitor. No phone, email, or form means no business."];

  // Performance
  if(l.indexOf("gzip")>=0)return["Gzip compression isn't enabled","Gzip shrinks your page files by 60-70% before sending. Without it, pages load twice as slow — and Google uses page speed as a ranking factor."];
  if(l.indexOf("caching")>=0||l.indexOf("cache header")>=0)return["No caching headers set","Without browser caching, returning visitors download your entire site again. Caching makes repeat visits nearly instant."];

  // Security headers
  if(l.indexOf("hsts")>=0)return["Missing HSTS header","HSTS forces browsers to always use HTTPS. Without it, a downgrade attack can silently intercept your visitors' traffic without them knowing."];
  if(l.indexOf("content security policy")>=0||l.indexOf("csp")>=0)return["Missing Content Security Policy","A basic CSP blocks most XSS attacks and injected scripts. Without it, a single script injection could compromise your entire site."];
  if(l.indexOf("x-frame-options")>=0||l.indexOf("clickjack")>=0)return["Missing X-Frame-Options header","Without this, another site can embed yours in an invisible iframe and trick users into clicking things they didn't intend to (clickjacking)."];
  if(l.indexOf("x-content-type")>=0||l.indexOf("nosniff")>=0)return["Missing X-Content-Type-Options header","Without this, browsers can be tricked into treating an image upload as executable code — a common attack vector."];
  if(l.indexOf("credited")>=0)return["Website credits a third-party who didn't build it","Your footer credits a design agency, but the site runs on a pre-built template. Someone charged you for a theme they downloaded. A genuine developer builds custom code."];

  // Image/Style/Speed fallbacks
  if(l.indexOf("script")>=0)return[iss,"Each third-party script is another network request that delays your page rendering. More than 10 scripts means 2+ seconds of load time before content appears."];
  if(l.indexOf("style")>=0||l.indexOf("css")>=0)return[iss,"Inline styles and many CSS files slow down your site and make it impossible to maintain. Every page would need individual updates."];
  if(l.indexOf("image")>=0||l.indexOf("img")>=0)return[iss,"Large or unoptimised images are the #1 cause of slow load times. Visitors on mobile connections will wait seconds for images to appear."];
  if(l.indexOf("slow")>=0||l.indexOf("speed")>=0||l.indexOf("load")>=0)return[iss,"Google uses page speed as a ranking factor, and users expect under 2-second load times. Every extra second increases abandonment."];
  if(l.indexOf("seo")>=0)return[iss,"Each page needs unique title tags, meta descriptions, and a clear heading hierarchy. Without them, Google can't tell what each page is about, and you won't rank for relevant searches."];
  if(l.indexOf("mobile")>=0||l.indexOf("responsive")>=0)return[iss,"Mobile traffic is over half your visitors globally. If your site doesn't work on phones, you're invisible to more than half your potential customers."];
  if(l.indexOf("security")>=0||l.indexOf("header")>=0||l.indexOf("x-")>=0)return[iss,"Security headers protect against common web attacks. A single missing header can be the difference between a secure site and a compromised one."];
  if(l.indexOf("content")>=0||l.indexOf("word")>=0||l.indexOf("blog")>=0)return[iss,"Service businesses that publish regular content targeting local keywords get 55% more site visitors. Each new page is a new chance to rank."];
  if(l.indexOf("wordpress")>=0)return[iss,"WordPress is the most hacked CMS. Without regular updates and security hardening, an unmaintained WP site is a ticking time bomb."];
  if(l.indexOf("builder")>=0||l.indexOf("platform")>=0)return[iss,"DIY platforms charge monthly fees and limit what you can do. A custom site costs less over time and you own everything."];

  // Last resort
  return[iss,"This fixable issue is one of 3-5 straightforward changes most Irish businesses need to boost their score by 20+ points and attract more customers."];
}


function buildItem(iss, bullet, color){
  var pair = pairText(iss);
  return `<div class="item"><div class="item-row"><div class="item-bullet"><span style="font-size:15px;color:${color}">${bullet}</span></div><div class="item-content"><div class="item-title">${esc(pair[0])}</div><div class="item-fix" style="color:${color}">${esc(pair[1])}</div></div></div></div>`;
}

function buildSection(title, subtitle, items, bullet, color, intro){
  if(!items||!items.length)return"";
  var h=`<hr><div class="sec-header"><div class="sec-label" style="color:${color}">${title}</div>`+(subtitle?`<div class="sec-sub">${subtitle}</div>`:"")+`</div><div class="sec-intro"><p>${intro}</p></div><div class="sec-body">`;
  for(var i=0;i<items.length;i++)h+=buildItem(items[i],bullet,color);
  return h+`</div>`;
}

function cardHTML(d){
  var h=`<div class="top-bar"></div><div class="brand"><div><span class="brand-tag">DS Studios</span><span class="brand-muted"> / Site Reports</span></div></div>`;
  h+=`<div class="greeting"><h2>Hi ${esc(d.name)},</h2><p>I had my AI agent take a thorough look at <strong>${esc(d.domain)}</strong> &mdash; scanning across SEO, performance, mobile readiness, security, and code quality.</p><p>Here&rsquo;s the full picture.</p></div>`;
  if(d.dead){
    h+=`<div class="dead-banner">Site unreachable &mdash; limited data available</div>`;
  } else {
    h+=`<div class="score-pad"><table><tr><td class="score-num">${d.score}<span class="score-total">/100</span></td></tr><tr><td class="score-label">overall score</td></tr></table></div>`;
    var sw=Math.min(d.score,100),c=barColor(d.score);
    h+=`<div class="score-bar-row"><div class="score-bar-track"><div class="score-bar-fill" style="width:${sw}%;background:${c}"></div></div><span class="score-bar-label">${sw}% of benchmark</span></div>`;
  }
  h+=buildSection("Technical Audit","SEO • Performance • Security • Mobile",d.tech,"→","#0d9488","Here’s what the automated scan found:");
  h+=buildSection("Visual Critique","Desktop • Mobile • Design Quality",d.visual,"◇","#7c3aed","Beyond the code, here’s what a human eye and a mobile viewport actually see:");
  h+=buildSection("Business Impact","Revenue • Conversion • Trust",d.business,"●","#e11d48","These aren’t just design preferences. They’re costing you money:");
  if(!d.dead)h+=`<hr><div class="sec-header"><div class="sec-label" style="color:#94a3b8">Audit Summary</div></div><div class="sec-body"><div class="stats-grid"><span class="k">Site</span><span class="v">${esc(d.domain)}</span><span class="k">Score</span><span class="v">${d.score}</span></div></div>`;
  if(d.emails&&d.emails.length)h+=`<hr><div class="sec-header"><div class="sec-label" style="color:#94a3b8">Contact</div></div><div class="email-list">${d.emails.map(function(e){return'<div class="email-link">'+esc(e)+'</div>'}).join('')}<div class="site-link"><a href="${esc(d.url)}" target="_blank">${esc(d.domain||d.url)}</a></div></div>`;
  h+=`<hr><div class="record-box"><div class="record-inner"><p><strong>Here’s the thing:</strong> these aren’t nitpicks. Each issue above is a real friction point that costs you customers every single day.</p></div></div>`;
  h+=`<div class="what-we-do"><div class="wwd-label">What DS Studios does</div><p>We build fast, modern websites for small Irish businesses. No templates. Clean code. We also add <strong>Telegram/WhatsApp AI assistants</strong> that let you update content on your site within minutes, not hours or days.</p></div>`;
  h+=`<hr><div class="cta-box"><div class="cta-inner"><h3>Want this score improved?</h3><p>We’re taking on <strong style="color:#0d9488">5 new clients this month</strong> and I’d love ${esc(d.name)} to be one of them.</p><p><strong>Here’s what to do:</strong> Reply to this email with <strong style="color:#0d9488">three times that work for a quick 10-minute call</strong> and I’ll confirm one. No pitch &mdash; just the scorecard and what a fix actually looks like.</p></div></div>`;
  h+=`<hr><div class="signoff"><div class="avatar">D</div><div class="signoff-text"><div class="signoff-name">Hunter</div><div class="signoff-title">DS Studios / Site Auditor</div></div></div>`;
  return h;
}

function show(i){
  cur=i;
  card.innerHTML=cardHTML(DATA[cur]);
  ctr.textContent=(cur+1)+"/"+DATA.length;
  pb.disabled=cur===0;
  nb.disabled=cur>=DATA.length-1;
  box.scrollTop=0;
}
pb.onclick=function(){if(cur>0)show(cur-1);};
nb.onclick=function(){if(cur<DATA.length-1)show(cur+1);};
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowLeft"&&cur>0)show(cur-1);
  if(e.key==="ArrowRight"&&cur<DATA.length-1)show(cur+1);
});
if(DATA&&DATA.length){show(0);}
</script>
