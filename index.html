var current = 0, isAnimating = false;
var stack = document.getElementById('cardStack');
var counter = document.getElementById('counter');
var prevBtn = document.getElementById('prevBtn');
var nextBtn = document.getElementById('nextBtn');
var loading = document.getElementById('loading');

function scoreColor(s){return s>=80?'#22c55e':s>=60?'#eab308':s>=40?'#f97316':s>=1?'#ef4444':'#64748b'}
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML}

function renderCard(entry){
  var col=scoreColor(entry.score),r=34,c=2*Math.PI*r,offset=c*(1-Math.min(entry.score,100)/100);
  var h='';
  if(entry._dead)h+='<div class="dead-banner">Site unreachable - limited data</div>';
  h+='<div class="hero">'
    +'<div class="score-ring"><svg width="80" height="80" viewBox="0 0 80 80">'
    +'<circle cx="40" cy="40" r="'+r+'" fill="none" stroke="#1e293b" stroke-width="5"/>'
    +'<circle cx="40" cy="40" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="5"'
    +' stroke-dasharray="'+c+'" stroke-dashoffset="'+offset+'" stroke-linecap="round"/></svg>'
    +'<div class="score-text" style="color:'+col+'">'+entry.score+'</div></div>'
    +'<div class="hero-info"><h2>'+esc(entry.businessName)+'</h2>'
    +'<div class="meta"><span>'+esc(entry.category||'-')+'</span>'
    +'<span class="sep">|</span><span>'+esc(entry.county||'-')+'</span>'
    +'<span class="sep">|</span><span>'+esc(entry.platform)+'</span></div></div></div>'

  var wc=entry.content.word_count||0;
  h+='<div class="stats">'
    +'<div class="stat-item"><div class="val">'+(entry.ssl_valid?'Valid SSL':'None')+'</div><div class="label">SSL</div></div>'
    +'<div class="stat-item"><div class="val">'+(entry.mobile.responsive_css?'Yes':'No')+'</div><div class="label">Responsive</div></div>'
    +'<div class="stat-item"><div class="val">'+(entry.performance.images||0)+'</div><div class="label">Images</div></div>'
    +'<div class="stat-item"><div class="val">'+entry.subpages_scanned+'</div><div class="label">Pages</div></div>'
    +'<div class="stat-item"><div class="val">'+Number(wc).toLocaleString()+'</div><div class="label">Words</div></div></div>'

  if(entry.issues&&entry.issues.length){h+='<div class="section"><div class="section-title">Issues ('+entry.issues.length+')</div>'
    +entry.issues.map(function(x){return'<div class="list-item issue">'+esc(x)+'</div>'}).join('')+'</div>'}

  if(entry.strengths&&entry.strengths.length){h+='<div class="section"><div class="section-title">Strengths ('+entry.strengths.length+')</div>'
    +entry.strengths.map(function(x){return'<div class="list-item strength">'+esc(x)+'</div>'}).join('')+'</div>'}

  h+='<div class="section"><div class="section-title">SEO</div><div class="kv-grid">'
    +'<span class="key">Title</span><span class="val">'+esc(entry.seo.title||'-')+'</span>'
    +'<span class="key">Meta Desc</span><span class="val">'+esc(entry.seo.meta_description||'-')+'</span>'
    +'<span class="key">H1</span><span class="val">'+esc(entry.seo.h1||'-')+'</span>'
    +'<span class="key">Open Graph</span><span class="val">'+(entry.seo.has_og_tags?'Yes':'No')+'</span></div></div>'

  var hs=entry.performance.html_size_kb?entry.performance.html_size_kb+' KB':'-';
  h+='<div class="section"><div class="section-title">Performance & Design</div><div class="kv-grid">'
    +'<span class="key">HTML Size</span><span class="val">'+hs+'</span>'
    +'<span class="key">Scripts</span><span class="val">'+(entry.performance.scripts||0)+'</span>'
    +'<span class="key">CSS Files</span><span class="val">'+(entry.performance.css_files||0)+'</span>'
    +'<span class="key">Gzip</span><span class="val">'+(entry.performance.gzip?'Yes':'No')+'</span>'
    +'<span class="key">Favicon</span><span class="val">'+(entry.design.favicon?'Yes':'No')+'</span>'
    +'<span class="key">Viewport</span><span class="val">'+(entry.mobile.viewport_meta&&entry.mobile.viewport_meta!='MISSING'?'Yes':'No')+'</span>'
    +'<span class="key">Contact</span><span class="val">'+(entry.content.has_contact?'Yes':'No')+'</span></div></div>'

  h+='<div class="section"><div class="section-title">Contact</div>';
  if(entry.emails&&entry.emails.length){for(var i=0;i<entry.emails.length;i++){h+='<a class="email-link" href="mailto:'+entry.emails[i]+'">'+esc(entry.emails[i])+'</a>'}}
  else{h+='<span style="color:#64748b;font-size:12px">No email found</span>'}
  if(entry.url){h+='<div style="margin-top:6px;font-size:11px;color:#475569;word-break:break-all"><a href="'+esc(entry.url)+'" target="_blank" style="color:#60a5fa;text-decoration:none">'+esc(entry.domain||entry.url)+'</a></div>'}
  h+='</div>'
  return h
}

function goTo(idx){if(isAnimating||idx<0||idx>=DATA.length)return;isAnimating=true;current=idx;updateCard();updateNav()}

function updateCard(){
  try{
    var card=document.querySelector('.card');
    if(card){
      card.style.transform='translateX(-30px)';card.style.opacity='0';
      setTimeout(function(){
        try{card.innerHTML='<div class="card-content">'+renderCard(DATA[current])+'</div>'}
        catch(e){console.error('Render err:',e)}
        card.style.transform='translateX(30px)';card.style.opacity='0';
        requestAnimationFrame(function(){requestAnimationFrame(function(){
          card.style.transform='translateX(0)';card.style.opacity='1';card.scrollTop=0;isAnimating=false
        })})
      },300)
    }else{
      if(loading)loading.style.display='none';
      var div=document.createElement('div');div.className='card';
      try{div.innerHTML='<div class="card-content">'+renderCard(DATA[current])+'</div>'}
      catch(e){console.error('Render err:',e)}
      stack.appendChild(div);isAnimating=false
    }
  }catch(e){console.error('Card err:',e);if(loading)loading.textContent='Error loading card';isAnimating=false}
}

function updateNav(){counter.textContent=(current+1)+'/'+DATA.length;if(prevBtn)prevBtn.disabled=current==0;if(nextBtn)nextBtn.disabled=current>=DATA.length-1}

var startX=0,startY=0,deltaX=0,isDragging=false,cardEl=null;
document.addEventListener('pointerdown',function(e){
  if(!e.target.closest('.card')||isAnimating)return;cardEl=document.querySelector('.card');if(!cardEl)return;
  isDragging=true;startX=e.clientX;startY=e.clientY;deltaX=0;cardEl.style.transition='none';cardEl.setPointerCapture(e.pointerId)
})
document.addEventListener('pointermove',function(e){
  if(!isDragging||!cardEl)return;deltaX=e.clientX-startX;
  if(Math.abs(deltaX)>10&&Math.abs(e.clientY-startY)<Math.abs(deltaX)*1.5)cardEl.style.transform='translateX('+deltaX+'px) rotate('+(deltaX*0.04)+'deg)'
})
document.addEventListener('pointerup',function(){
  if(!isDragging||!cardEl)return;isDragging=false;cardEl.style.transition='transform .3s cubic-bezier(.22,1,.36,1),opacity .3s ease'
  if(deltaX<-80&current<DATA.length-1){cardEl.style.transform='translateX(-120%) rotate(-8deg)';cardEl.style.opacity='0';setTimeout(function(){goTo(current+1)},200)}
  else if(deltaX>80&current>0){cardEl.style.transform='translateX(120%) rotate(8deg)';cardEl.style.opacity='0';setTimeout(function(){goTo(current-1)},200)}
  else{cardEl.style.transform='translateX(0)'};cardEl=null
})
if(prevBtn)prevBtn.addEventListener('click',function(){goTo(current-1)})
if(nextBtn)nextBtn.addEventListener('click',function(){goTo(current+1)})
document.addEventListener('keydown',function(e){if(e.key=='ArrowLeft')goTo(current-1);if(e.key=='ArrowRight')goTo(current+1)})

if(DATA&&DATA.length){updateCard();updateNav()}else{if(loading)loading.textContent='No data'}
</script>
