<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Batch 1 - Site Audit Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:Inter,-apple-system,sans-serif;background:#f8f7f4;display:flex;flex-direction:column}
.header{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#fff;border-bottom:1px solid #f1f5f9}
.header h1{font-size:15px;font-weight:700;color:#0f172a}
.header .counter{font-size:12px;font-weight:600;color:#94a3b8;background:#f8fafc;padding:4px 10px;border-radius:8px;border:1px solid #f1f5f9}
.card-wrapper{flex:1;overflow-y:auto;padding:16px;min-height:0;display:flex;flex-direction:column;align-items:center}
.card{width:100%;max-width:560px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);margin:0 auto 16px}
.top-bar{height:3px;background:#1e293b}
.brand{padding:36px 48px 0;display:flex;justify-content:space-between;align-items:center}
.brand-tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;background:rgba(13,148,136,.07);color:#0d9488}
.brand-muted{font-size:11px;color:#94a3b8}
.brand-date{font-size:10px;color:#cbd5e1}
.greeting{padding:32px 48px 0}
.greeting h2{margin:0 0 18px;font-size:20px;font-weight:600;color:#0f172a;letter-spacing:-.01em;font-family:Playfair Display,serif}
.greeting p{margin:0 0 16px;font-size:15px;color:#334155;line-height:1.7}
.score-pad{padding:4px 48px 28px}
.score-num{font-size:52px;font-weight:600;color:#0f172a;letter-spacing:-.03em;line-height:1;font-family:Playfair Display,serif}
.score-total{font-size:18px;font-weight:400;color:#94a3b8;margin-left:4px}
.score-label{font-size:12px;color:#94a3b8;padding-top:4px}
.score-bar-row{display:flex;align-items:center;padding:0 48px 16px}
.score-bar-track{width:120px;height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden}
.score-bar-fill{height:4px;border-radius:2px}
.score-bar-label{font-size:11px;color:#94a3b8;padding-left:10px}
hr{border:none;height:1px;background:#f1f5f9;margin:0 48px}
.sec-header{padding:20px 48px 4px}
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.sec-sub{font-size:11px;color:#94a3b8;margin-top:3px}
.sec-intro{padding:4px 48px 0}
.sec-intro p{margin:0 0 12px;font-size:13px;color:#475569;line-height:1.6}
.sec-body{padding:0 48px 4px}
.item{padding:0 0 18px;border-bottom:1px solid #f1f5f9;margin-bottom:18px}
.item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.item-row{display:table;width:100%}
.item-bullet{display:table-cell;width:18px;vertical-align:top;padding:2px 0 0 0;text-align:left}
.item-content{display:table-cell;padding:0 0 0 10px}
.item-title{font-size:14px;color:#0f172a;line-height:1.6;font-weight:500}
.item-fix{font-size:13px;line-height:1.5;margin-top:4px}
.dead-banner{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:8px;padding:10px 14px;margin:0 48px 16px;text-align:center;font-size:12px;color:#dc2626}
.record-box{padding:24px 48px 0}
.record-inner{background:#fdfbf7;border-radius:10px;border:1px solid #f1ede4;padding:16px 20px}
.record-inner p{margin:0;font-size:13px;color:#6b5a3e;line-height:1.6}
.what-we-do{padding:28px 48px 0}
.wwd-label{font-size:11px;font-weight:500;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.what-we-do p{margin:0;font-size:14px;color:#475569;line-height:1.7}
.what-we-do strong{color:#0f172a}
.cta-box{padding:28px 48px 0}
.cta-inner{background:#f0fdfa;border-radius:10px;border:1.5px solid rgba(13,148,136,.27);padding:20px 24px}
.cta-inner h3{margin:0 0 10px;font-size:15px;font-weight:700;color:#0f172a;font-family:Playfair Display,serif}
.cta-inner p{margin:0 0 10px;font-size:14px;color:#475569;line-height:1.6}
.cta-inner p:last-child{margin-bottom:0}
.signoff{padding:24px 48px 28px;display:flex;align-items:center}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px;flex-shrink:0;background:linear-gradient(135deg,#0d9488,rgba(13,148,136,.47))}
.signoff-text{padding-left:12px}
.signoff-name{font-size:14px;font-weight:600;color:#0f172a}
.signoff-title{font-size:12px;color:#94a3b8}
.email-list{padding:0 48px 4px}
.email-link{font-size:12px;color:#0d9488;padding:2px 0}
.site-link{font-size:10px;color:#94a3b8;word-break:break-all;margin-top:4px}
.site-link a{color:#0d9488;text-decoration:none}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;font-size:12px;line-height:1.8}
.stats-grid .k{color:#64748b;white-space:nowrap}
.stats-grid .v{font-weight:500;color:#0f172a;text-align:right}
.nav-bar{flex-shrink:0;display:flex;justify-content:space-between;padding:10px 20px 14px;gap:10px;background:#fff;border-top:1px solid #f1f5f9}
.nav-btn{background:#fff;border:1px solid #e2e8f0;color:#334155;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;flex:1;font-family:inherit}
.nav-btn:hover:not(:disabled){background:#f8fafc;border-color:#cbd5e1}
.nav-btn:disabled{opacity:.3;cursor:default}
.loading{color:#94a3b8;font-size:14px;padding:40px;text-align:center}
@media(max-width:600px){
  .brand,.greeting,.score-pad,.score-bar-row,.sec-header,.sec-intro,.sec-body,.dead-banner,.record-box,.what-we-do,.cta-box,.signoff,.email-list{padding-left:20px!important;padding-right:20px!important}
  hr{margin-left:20px!important;margin-right:20px!important}
  .card{max-width:100%;border-radius:8px}
  .score-num{font-size:36px}
  .greeting h2{font-size:17px}
  .item-title{font-size:13px}
}
</style>
</head>

</div>

function pairText(iss){
  var l=iss.toLowerCase();

  if(l.indexOf("certificate expires")>=0)return["SSL certificate expiring soon","Set up auto-renewal in your hosting control panel or use Certbot. An expired SSL breaks your site for every visitor and shows a full-screen security warning."];
  if(l.indexOf("ssl expires")>=0)return["SSL certificate expiring soon","Set up auto-renewal in your hosting control panel or use Certbot. An expired SSL breaks your site for every visitor and shows a full-screen security warning."];
  if(l.indexOf("no ssl")>=0)return["No SSL certificate detected","Install a free SSL cert from Let's Encrypt (Certbot) or your host's control panel. It gives visitors the green padlock and Google flags non-HTTPS sites as 'Not Secure'."];
  if(l.indexOf("ssl certificate")>=0)return["No SSL certificate detected","Install a free SSL cert from Let's Encrypt (Certbot) or your host's control panel. It gives visitors the green padlock and Google flags non-HTTPS sites as 'Not Secure'."];
  if(l.indexOf("godaddy builder")>=0)return["Using GoDaddy Website Builder","GoDaddy's builder produces bloated code that scores poorly on performance and SEO. You also can't take the site elsewhere. A proper site built on a real CMS gives you ownership and speed."];
  if(l.indexOf("godaddy")>=0)return["Using GoDaddy Website Builder","GoDaddy's builder produces bloated code that scores poorly on performance and SEO. You also can't take the site elsewhere. A proper site built on a real CMS gives you ownership and speed."];
  if(l.indexOf("wix")>=0)return["Using Wix","Wix sites are slow and hard to migrate. You can't fully control your SEO, and moving to another host later means rebuilding from scratch. A lightweight custom site takes less time to load than Wix's editor."];
  if(l.indexOf("squarespace")>=0)return["Using Squarespace","Squarespace locks your content into their template system. Advanced SEO, custom functionality, and fast load times are limited by their platform. A static site built with Hugo or plain HTML loads in under a second."];
  if(l.indexOf("shopify")>=0)return["Using Shopify","Shopify is great for retail, but the monthly fees add up and you pay transaction fees on every sale. A custom e-commerce site pays for itself in a year and you own the code."];
  if(l.indexOf("diy builder")>=0)return["Using a DIY website builder","DIY platforms limit your SEO control, page speed, and customisation. A custom-built site loads faster, ranks higher, and has no monthly template fees."];
  if(l.indexOf("http resources")>=0)return["Mixed content detected (HTTP resources on HTTPS)","Find and replace http:// with https:// in your image/script/stylesheet URLs. Browsers block mixed content by default. Your visitors see a broken page or a grey padlock warning."];
  if(l.indexOf("mixed content")>=0)return["Mixed content detected (HTTP on HTTPS)","Change all resource URLs from http:// to https://. Browsers block active mixed content (scripts, iframes) entirely, breaking parts of your site silently."];
  if(l.indexOf("css files")>=0||l.indexOf("external css")>=0)return["Multiple external CSS files","Combine CSS files and minify them. Each separate CSS file is an extra HTTP request. On a mobile connection, 8+ CSS files can add a full second of load time before the page even starts rendering."];
  if(l.indexOf("too many scripts")>=0||l.indexOf("external scripts")>=0)return["Too many scripts loading","Defer non-critical scripts with the 'defer' or 'async' attribute. Move analytics and tracking pixels to the end of the page. Every script is a blocking request that delays your page rendering."];
  if(l.indexOf("viewport")>=0)return["Missing viewport meta tag","Add <meta name='viewport' content='width=device-width, initial-scale=1'> to your <head>. Without it, mobile users see a zoomed-out mini version they have to pinch to read."];
  if(l.indexOf("no mobile")>=0)return["The site isn't configured for mobile","Implement responsive design with flexible grids and images. Mobile traffic is over half your visitors. If they have to pinch and zoom, they'll leave."];
  if(l.indexOf("responsively designed")>=0||l.indexOf("not responsive")>=0)return["The site isn't mobile-friendly","Use CSS media queries to adjust layout at different screen widths. Over 60% of visitors will be on phones. If the site doesn't fit their screen, they leave within seconds."];
  if(l.indexOf("0.8kb")>=0||l.indexOf("very small page")>=0)return["Page is unusually small or broken","Check if the page content is loading properly in a private browser window. Pages under 5KB usually mean broken JavaScript or an incomplete page render. If the page looks empty, your visitors see the same."];
  if(l.indexOf("page size")>=0)return["Page is larger than recommended","Compress images (TinyPNG or WebP format), minify CSS/JS, and lazy-load below-the-fold content. Pages over 250KB load noticeably slower on 4G. Aim for under 150KB."];
  if(l.indexOf("thin content")>=0)return["Content is thinner than it should be","Add a Services/About page with 300+ words describing what you offer and who you serve. Google needs text content to understand what your site is about. A one-page site with a paragraph won't rank."];
  if(l.indexOf("broken image")>=0)return["Broken images on the page","Check the image src paths and upload the files if they're missing. Broken images show as empty boxes or missing icons. Every broken image makes your site look neglected."];
  if(l.indexOf("alt text")>=0||l.indexOf("missing alt")>=0)return["Images missing alt text","Add descriptive alt attributes to every <img> tag. Alt text helps blind users understand images and helps Google index them. It's also required for WCAG compliance - without it, you risk accessibility complaints."];
  if(l.indexOf("placeholder")>=0)return["Placeholder or low-quality images","Replace placeholder images with real photography or custom graphics. Stock placeholders and tiny images look unprofessional and erode trust before visitors read a single word."];
  if(l.indexOf("no images")>=0)return["No images on the page","Add at least one hero image or brand-consistent graphic. Pages without images feel empty and uninviting. Even a simple branded header image improves trust and time-on-site."];
  if(l.indexOf("meta description")>=0)return["There's no meta description","Write a 155-character summary of what you do. Google uses it as your search snippet. Without one, it pulls random text from your page instead."];
  if(l.indexOf("h1 heading")>=0||l.indexOf("no h1")>=0)return["No H1 heading on the page","Add a single <h1> tag that describes what the page is about. Google uses it as a primary ranking signal and screen readers use it to navigate. Without one, search engines guess your page topic."];
  if(l.indexOf("canonical url")>=0)return["No canonical URL is set","Add <link rel='canonical' href='...'> to each page's <head>. If the same page loads at multiple URLs (with and without www, /, ? parameters), Google splits your ranking across all of them."];
  if(l.indexOf("open graph")>=0)return["Missing Open Graph tags","Add og:title, og:description, and og:image meta tags. When someone shares your site on Facebook, LinkedIn, or WhatsApp, these control the preview. Without them, you get a bare link and the wrong image."];
  if(l.indexOf("schema")>=0)return["No schema markup","Add LocalBusiness or Organization structured data using JSON-LD format. Schema tells Google your opening hours, address, phone, and reviews. Sites with schema rank higher in local searches and show richer snippets."];
  if(l.indexOf("no analytics")>=0)return["No analytics tracking","Install Google Analytics or Plausible (privacy-friendly). Without it, you have no idea where your traffic comes from, what pages people visit, or why people leave. You're making business decisions blind."];
  if(l.indexOf("inline style")>=0)return["Too many inline style blocks","Move CSS into an external .css file and only apply classes in the HTML. Inline styles bloat page size, can't be cached, and make future edits painful because you edit every page separately."];
  if(l.indexOf("favicon")>=0)return["No favicon detected","Create a 32x32 or 64x64 PNG of your logo and add <link rel='icon' href='/favicon.png'>. Every browser tab and bookmark shows a blank document icon instead of your brand."];
  if(l.indexOf("outdated layout")>=0||l.indexOf("flexbox")>=0)return["Outdated layout method","Switch from float/table-based layouts to CSS Flexbox or Grid. Float layouts break on mobile and are a sign the site hasn't been updated in 5+ years. Modern CSS is supported in every browser since 2020."];
  if(l.indexOf("limited palette")>=0||l.indexOf("color palette")>=0)return["Limited colour palette","Introduce 2-3 complementary colours for headings, accents, and backgrounds. A single colour throughout looks flat and un-designed. Even one accent colour on buttons and links improves the feel significantly."];
  if(l.indexOf("semantic navbar")>=0)return["No semantic navbar","Wrap your main navigation in <nav> tags instead of <div>. Screen readers use <nav> to let blind users jump straight to the menu. Google also uses it to understand your site structure."];
  if(l.indexOf("no contact")>=0||l.indexOf("contact method")>=0||l.indexOf("contact form")>=0)return["No contact method found","Add a contact form or at minimum a phone number/email in the footer. If potential customers can't reach you within 5 seconds of visiting, they go to your competitor."];
  if(l.indexOf("gzip compression")>=0)return["Gzip compression isn't enabled","Enable it in your .htaccess (Apache) or server config. It shrinks your page files by 60-70% before sending them, so pages load in half the time."];
  if(l.indexOf("caching headers")>=0)return["No caching headers set","Add Cache-Control and ETag headers via your server config or a plugin. Returning visitors load your site almost instantly instead of re-downloading everything."];
  if(l.indexOf("hsts")>=0)return["Missing HSTS header","Add 'Strict-Transport-Security: max-age=31536000' to your server response headers. HSTS forces browsers to always use HTTPS. Without it, a downgrade attack can silently intercept your traffic."];
  if(l.indexOf("content security policy")>=0)return["Missing Content Security Policy","Add a Content-Security-Policy header that whitelists your own domain. A basic CSP blocks most XSS attacks and injected scripts. Without it, any script injection could compromise your site."];
  if(l.indexOf("x-frame-options")>=0)return["Missing X-Frame-Options header","Add 'X-Frame-Options: DENY' to your server headers. Without this, another website can embed your site invisibly in an iframe and trick users into clicking things they didn't intend to (clickjacking attack)."];
  if(l.indexOf("x-content-type-options")>=0)return["Missing X-Content-Type-Options header","Add 'X-Content-Type-Options: nosniff' to your server headers. This prevents browsers from guessing the file type of resources. A common attack vector is tricking the browser into treating an image upload as executable code."];
  if(l.indexOf("credited")>=0)return["Website credits a third-party developer who didn't build it","Your footer credits a design agency, but the site runs on a pre-built template. This means someone charged you for a theme they downloaded. A genuine developer builds custom code; a reseller swaps logos on a template."];

  // Fallback patterns (still specific, benefit-driven)
  if(l.indexOf("script")>=0)return[iss,"Consolidate and defer third-party scripts. Each script is a network request that blocks page rendering. Aim for under 10 scripts total by removing unused tracking pixels and defering non-critical ones."];
  if(l.indexOf("style")>=0||l.indexOf("css")>=0)return[iss,"Move inline styles to an external stylesheet and combine CSS files. Minify the output. This reduces page size, enables caching, and makes future edits manageable."];
  if(l.indexOf("image")>=0||l.indexOf("img")>=0)return[iss,"Optimise images: convert to WebP, set explicit dimensions, and lazy-load below-the-fold images. Properly sized images load faster and prevent layout shifts that annoy users."];
  if(l.indexOf("slow")>=0||l.indexOf("speed")>=0||l.indexOf("load")>=0)return[iss,"Optimise load time by compressing images, minifying code, enabling caching, and using a CDN. Google uses page speed as a ranking factor and users expect under 2-second load times."];
  if(l.indexOf("seo")>=0)return[iss,"Fix on-page SEO: unique title tags, meta descriptions, heading hierarchy, and keyword-rich content. Each page should target a specific search intent."];
  if(l.indexOf("mobile")>=0||l.indexOf("responsive")>=0)return[iss,"Use responsive design with flexible layouts and touch-friendly buttons. Test on real devices. Most Irish consumers browse on phones first."];
  if(l.indexOf("security")>=0||l.indexOf("header")>=0||l.indexOf("x-")>=0)return[iss,"Security headers are a one-time config in your server or .htaccess file. They protect against common web attacks and cost nothing to implement."];
  if(l.indexOf("blog")>=0||l.indexOf("content")>=0)return[iss,"Regular blog posts targeting local keywords bring organic traffic. Each post is a new page that Google can index. Service businesses that blog get 55% more site visitors."];
  if(l.indexOf("wordpress")>=0)return[iss,"WordPress is flexible but needs regular updates, caching plugins, and security hardening. An unmaintained WP site is the most common entry point for site hacks."];
  if(l.indexOf("builder")>=0||l.indexOf("platform")>=0)return[iss,"DIY builders limit control. A custom-built site pays for itself in lower monthly costs, better SEO, and the ability to add exactly what you need."];

  // Last resort - still specific
  return[iss,"This is a fixable issue. Most Irish businesses we audit have 3-5 straightforward changes that would boost their score by 20+ points."];
}


function buildItem(iss, bullet, color){
  var pair = pairText(iss);
  var h = `<div class="item"><div class="item-row">`;
  h += `<div class="item-bullet"><span style="font-size:15px;color:${color}">${bullet}</span></div>`;
  h += `<div class="item-content"><div class="item-title">${esc(pair[0])}</div>`;
  h += `<div class="item-fix" style="color:${color}">${esc(pair[1])}</div>`;
  h += `</div></div></div>`;
  return h;
}

function buildSection(title, subtitle, items, bullet, color, introText){
  if(!items||!items.length)return"";
  var h = `<hr><div class="sec-header"><div class="sec-label" style="color:${color}">${title}</div>`;
  if(subtitle)h+=`<div class="sec-sub">${subtitle}</div>`;
  h+=`</div>`;
  h+=`<div class="sec-intro"><p>${introText}</p></div>`;
  h+=`<div class="sec-body">`;
  for(var i=0;i<items.length;i++)h+=buildItem(items[i],bullet,color);
  h+=`</div>`;
  return h;
}

function cardHTML(d){
  var h = `<div class="card"><div class="top-bar"></div>`;
  h += `<div class="brand"><div><span class="brand-tag">DS Studios</span><span class="brand-muted"> / Site Reports</span></div><div class="brand-date"></div></div>`;
  h += `<div class="greeting"><h2>Hi ${esc(d.name)},</h2>`;
  h += `<p>I had my AI agent take a thorough look at <strong>${esc(d.domain)}</strong> &mdash; scanning across SEO, performance, mobile readiness, security, and code quality.</p>`;
  h += `<p>Here&rsquo;s the full picture.</p></div>`;

  if(d.dead){
    h += `<div class="dead-banner">Site unreachable &mdash; limited data available</div>`;
  } else {
    var sc = d.score>0?d.score:"N/A";
    h += `<div class="score-pad"><table><tr><td class="score-num">${sc}<span class="score-total">/100</span></td></tr>`;
    h += `<tr><td class="score-label">overall score</td></tr></table></div>`;
    var sw=Math.min(d.score,100),scC=barColor(d.score);
    h += `<div class="score-bar-row"><div class="score-bar-track"><div class="score-bar-fill" style="width:${sw}%;background:${scC}"></div></div>`;
    h += `<span class="score-bar-label">${sw}% of benchmark</span></div>`;
  }

  // SECTION 1: Technical Audit (teal)
  h += buildSection("Technical Audit","SEO • Performance • Security • Mobile",d.tech,"→","#0d9488","Here’s what the automated scan found:");

  // SECTION 2: Visual Critique (violet)
  h += buildSection("Visual Critique","Desktop • Mobile • Design Quality",d.visual,"◇","#7c3aed","Beyond the code, here’s what a human eye (and a mobile viewport) actually sees:");

  // SECTION 3: Business Impact (rose)
  h += buildSection("Business Impact","Revenue • Conversion • Trust",d.business,"●","#e11d48","These aren’t just design preferences. They’re costing you money:");

  // Stats grid
  if(!d.dead){
    h += `<hr><div class="sec-header"><div class="sec-label" style="color:#94a3b8">Audit Summary</div></div>`;
    h += `<div class="sec-body"><div class="stats-grid">`;
    h += `<span class="k">SSL</span><span class="v">${d.ssl_valid?"Valid":"None"}</span>`;
    h += `<span class="k">Mobile Ready</span><span class="v">${d.rwd?"Yes":"No"}</span>`;
    h += `<span class="k">Images</span><span class="v">${d.images}</span>`;
    h += `<span class="k">Pages</span><span class="v">${d.pages}</span>`;
    h += `<span class="k">Words</span><span class="v">${Number(d.words).toLocaleString()}</span>`;
    h += `<span class="k">HTML Size</span><span class="v">${d.html_kb?d.html_kb+" KB":"—"}</span>`;
    h += `<span class="k">Scripts</span><span class="v">${d.scripts}</span>`;
    h += `<span class="k">CSS Files</span><span class="v">${d.css_files}</span>`;
    h += `<span class="k">Gzip</span><span class="v">${d.gzip?"Yes":"No"}</span>`;
    h += `<span class="k">OG Tags</span><span class="v">${d.og_tags?"Yes":"No"}</span>`;
    h += `<span class="k">Favicon</span><span class="v">${d.favicon?"Yes":"No"}</span>`;
    h += `<span class="k">Contact Info</span><span class="v">${d.has_contact?"Yes":"No"}</span>`;
    h += `</div></div>`;
  }

  // Contact
  h += `<hr><div class="sec-header"><div class="sec-label" style="color:#94a3b8">Contact</div></div>`;
  h += `<div class="email-list">`;
  if(d.emails&&d.emails.length){
    for(var i=0;i<d.emails.length;i++)h+=`<div class="email-link">${esc(d.emails[i])}</div>`;
  } else {
    h+=`<div style="font-size:12px;color:#94a3b8">No email found</div>`;
  }
  if(d.url){h+=`<div class="site-link"><a href="${esc(d.url)}" target="_blank">${esc(d.domain||d.url)}</a></div>`;}
  h+=`</div>`;

  // Record scratch
  h+=`<hr><div class="record-box"><div class="record-inner"><p><strong>Here’s the thing:</strong> these aren’t nitpicks. Each issue above is a real friction point that costs you customers every single day.</p></div></div>`;

  // What we do
  h+=`<div class="what-we-do"><div class="wwd-label">What DS Studios does</div>`;
  h+=`<p>We build fast, modern websites for small Irish businesses. No templates. Clean code. We also add <strong>Telegram/WhatsApp AI assistants</strong> that let you update content on your site within minutes, not hours or days. Plus live chat and review automations.</p></div>`;

  // CTA
  h+=`<hr><div class="cta-box"><div class="cta-inner"><h3>Want this score improved?</h3>`;
  h+=`<p>We’re taking on <strong style="color:#0d9488">5 new clients this month</strong> and I’d love ${esc(d.name)} to be one of them. Each client gets a full audit walkthrough, a redesign roadmap, and a modern site built from clean code.</p>`;
  h+=`<p><strong>Here’s what to do:</strong> Reply to this email with <strong style="color:#0d9488">three times that work for a quick 10-minute call</strong> and I’ll confirm one. No pitch &mdash; just the scorecard and what a fix actually looks like.</p></div></div>`;

  // Signoff
  h+=`<hr><div class="signoff"><div class="avatar">D</div><div class="signoff-text"><div class="signoff-name">Hunter</div><div class="signoff-title">DS Studios / Site Auditor</div></div></div>`;

  h+=`</div>`;
  return h;
}

function show(i){
  cur=i;
  box.innerHTML=cardHTML(DATA[cur])+`<div style="text-align:center;color:#94a3b8;font-size:10px;padding:4px 0 8px">Automated audit by AI</div>`;
  ctr.textContent=(cur+1)+"/"+DATA.length;
  pb.disabled=cur===0;
  nb.disabled=cur>=DATA.length-1;
  box.scrollTop=0;
}

pb.onclick=function(){if(cur>0)show(cur-1);};
nb.onclick=function(){if(cur<DATA.length-1)show(cur+1);};
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowLeft"&&cur>0)show(cur-1);
  if(e.key==="ArrowRight"&&cur<DATA.length-1)show(cur+1);
});

if(DATA&&DATA.length){show(0);}else{box.innerHTML=`<div class="loading">No data</div>`;}
</script>
</body>
</html>
